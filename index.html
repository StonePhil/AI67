<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Shield // Live Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Улучшенная типографика и плавность */
        body {
            font-feature-settings: "cv02", "cv03", "cv04", "cv11";
            -webkit-font-smoothing: antialiased;
        }

        .log-scroll-container {
            height: calc(100vh - 110px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        /* Тонкий современный скроллбар */
        .log-scroll-container::-webkit-scrollbar { width: 6px; }
        .log-scroll-container::-webkit-scrollbar-track { background: transparent; }
        .log-scroll-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .log-scroll-container::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        .selected-row { 
            background-color: #f8fafc !important; 
            border-left: 4px solid #0891b2 !important; 
            box-shadow: inset 2px 0 8px rgba(0,0,0,0.02);
        }
        
        .panel-transition { transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); }

        #filter-menu { display: none; }
        #filter-menu.active { display: block; }

        /* Софт-бордеры и тени для light mode */
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen font-sans flex flex-col overflow-hidden">

    <header class="border-b border-slate-200/60 glass-panel px-8 py-4 flex items-center justify-between relative z-10 shadow-sm">
        <div class="flex items-center space-x-4">
            <div class="text-cyan-600 bg-cyan-50 p-2 rounded-lg">
                <i data-lucide="shield-check" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-tight text-slate-900 uppercase">AI Shield</h1>
                <p class="text-[10px] text-slate-400 font-mono font-medium uppercase tracking-wider">Security Operations Center v2.5</p>
            </div>
        </div>

        <!-- Global Stats -->
        <div class="hidden md:flex items-center space-x-10">
            <div class="flex flex-col">
                <span class="text-[9px] uppercase text-slate-400 font-bold tracking-widest">System Load</span>
                <span id="stat-total" class="text-sm font-mono font-bold text-slate-900 italic">0</span>
            </div>
            <div class="flex space-x-8 border-l border-slate-200 pl-8">
                <div class="flex flex-col"><span class="text-[9px] text-emerald-600 font-bold uppercase tracking-widest">Normal</span><span id="stat-safe" class="text-sm font-mono font-semibold text-slate-700">0</span></div>
                <div class="flex flex-col"><span class="text-[9px] text-amber-600 font-bold uppercase tracking-widest">Elevated</span><span id="stat-warn" class="text-sm font-mono font-semibold text-slate-700">0</span></div>
                <div class="flex flex-col"><span class="text-[9px] text-red-600 font-bold uppercase tracking-widest">Critical</span><span id="stat-crit" class="text-sm font-mono font-semibold text-slate-700">0</span></div>
            </div>
        </div>

        <div class="flex items-center space-x-3">
            <button id="filter-btn" onclick="toggleFilterMenu(event)" class="flex items-center space-x-2 bg-white border border-slate-200 px-4 py-2 rounded-lg text-[10px] font-bold uppercase text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm">
                <i data-lucide="filter" class="w-3.5 h-3.5"></i>
                <span>Filter Streams</span>
            </button>
        </div>

        <!-- Filter Dropdown -->
        <div id="filter-menu" class="absolute top-16 right-8 bg-white border border-slate-200 rounded-xl shadow-xl p-5 w-56 z-50">
            <h3 class="text-[10px] uppercase font-bold text-slate-400 mb-4 border-b border-slate-50 pb-2 tracking-widest">Threat Threshold</h3>
            <div class="space-y-3">
                <label class="flex items-center space-x-3 cursor-pointer group">
                    <input type="checkbox" value="0" class="filter-checkbox w-4 h-4 rounded border-slate-300 text-cyan-600 focus:ring-cyan-500">
                    <span class="text-xs font-medium text-slate-600 group-hover:text-slate-900">Level 0 (Safe)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer group">
                    <input type="checkbox" value="1" class="filter-checkbox w-4 h-4 rounded border-slate-300 text-cyan-600">
                    <span class="text-xs font-medium text-slate-600 group-hover:text-slate-900">Level 1 (Info)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer group">
                    <input type="checkbox" value="2" class="filter-checkbox w-4 h-4 rounded border-slate-300 text-cyan-600">
                    <span class="text-xs font-medium text-slate-600 group-hover:text-slate-900 text-blue-600">Level 2 (Warning)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer group">
                    <input type="checkbox" value="3" class="filter-checkbox w-4 h-4 rounded border-slate-300 text-cyan-600">
                    <span class="text-xs font-medium text-slate-600 group-hover:text-slate-900 text-amber-600">Level 3 (Alert)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer group">
                    <input type="checkbox" value="4" class="filter-checkbox w-4 h-4 rounded border-slate-300 text-cyan-600">
                    <span class="text-xs font-medium text-slate-600 group-hover:text-slate-900 text-orange-600">Level 4 (High)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer group">
                    <input type="checkbox" value="5" class="filter-checkbox w-4 h-4 rounded border-slate-300 text-cyan-600">
                    <span class="text-xs font-medium text-slate-600 group-hover:text-slate-900 text-red-600">Level 5 (Critical)</span>
                </label>
            </div>
            <button onclick="clearFilters()" class="mt-5 w-full text-[10px] uppercase font-bold text-cyan-600 hover:text-cyan-700 text-center border-t border-slate-100 pt-3 transition-colors">Reset All Filters</button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <section id="log-container" class="flex-1 flex flex-col border-r border-slate-200/60 bg-white">
            <div class="px-8 py-3 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                <span class="text-[10px] font-bold uppercase tracking-[0.15em] text-slate-400">Live Telemetry Ingestion</span>
                <div class="flex items-center space-x-2">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                    </span>
                    <span id="conn-status" class="text-[10px] font-mono font-bold text-cyan-600 uppercase">Socket Active</span>
                </div>
            </div>

            <div id="stream-target" class="log-scroll-container">
                <div id="empty-state" class="flex flex-col items-center justify-center h-full py-20">
                    <div class="bg-slate-50 p-6 rounded-full mb-4">
                        <i data-lucide="database" class="w-8 h-8 text-slate-300"></i>
                    </div>
                    <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Waiting for incoming packets...</p>
                </div>
            </div>
        </section>

        <aside id="detail-panel" class="w-0 opacity-0 overflow-hidden panel-transition bg-slate-50 flex flex-col">
            <div class="p-8 space-y-8 flex-1 overflow-y-auto leading-relaxed">
                <div class="flex items-center justify-between">
                    <h2 class="text-[11px] font-black uppercase tracking-[0.2em] text-slate-900">Event Analysis</h2>
                    <button onclick="closePanel()" class="text-slate-400 hover:text-slate-900 bg-white p-1.5 rounded-lg border border-slate-200 transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                
                <div id="detail-content" class="space-y-8">
                    <div class="space-y-2">
                        <span id="det-badge" class="px-3 py-1 rounded-md text-[10px] font-bold uppercase border shadow-sm inline-block"></span>
                        <p id="det-timestamp" class="text-[11px] font-mono font-medium text-slate-400"></p>
                    </div>

                    <div class="bg-white p-6 rounded-xl border border-slate-200/60 shadow-sm font-mono text-[12px] space-y-4">
                        <div class="flex justify-between items-center border-b border-slate-50 pb-2"><span class="text-slate-400">Target Service</span><span id="det-service" class="text-cyan-700 font-bold uppercase"></span></div>
                        <div class="flex justify-between items-center border-b border-slate-50 pb-2"><span class="text-slate-400">Protocol</span><span id="det-proto" class="text-slate-700 font-bold"></span></div>
                        <div class="flex justify-between items-center border-b border-slate-50 pb-2"><span class="text-slate-400">Transmission Flag</span><span id="det-flag" class="text-slate-700"></span></div>
                        <div class="pt-2 flex justify-between items-center"><span class="text-slate-400">Source Payload</span><span id="det-bytes" class="text-slate-900 font-bold"></span></div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Explainable AI Analysis</label>
                        <div id="det-reason" class="text-xs leading-relaxed text-slate-600 bg-white p-5 rounded-xl border border-slate-200 shadow-inner italic"></div>
                    </div>

                    <div class="space-y-3 pt-4">
                        <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Intervention Protocol</label>
                        <select class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-xs text-slate-900 font-medium focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all shadow-sm cursor-pointer appearance-none">
                            <option selected disabled>Select mitigation strategy...</option>
                            <option>Immediate IP Blacklist</option>
                            <option>Sandboxed Observation</option>
                            <option>Level 2 Escalation</option>
                            <option>Whitelist (False Positive)</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="p-8 border-t border-slate-200/60 bg-white/50 backdrop-blur-sm">
                <button class="w-full bg-slate-900 hover:bg-slate-800 text-white text-[11px] font-bold py-4 rounded-xl uppercase tracking-[0.2em] shadow-lg shadow-slate-200 transition-all active:scale-[0.98]">Execute Mitigation</button>
            </div>
        </aside>
    </main>

    <script>
        lucide.createIcons();
        let counts = { total: 0, safe: 0, warn: 0, crit: 0 };
        let activeFilters = new Set();

        // Стили адаптированы под светлую тему (более темный текст для контраста)
        const styles = {
            0: { lbl: 'L0 Safe', bg: 'bg-emerald-50', txt: 'text-emerald-700', bdr: 'border-emerald-200', cat: 'safe' },
            1: { lbl: 'L1 Info', bg: 'bg-emerald-50', txt: 'text-emerald-700', bdr: 'border-emerald-200', cat: 'safe' },
            2: { lbl: 'L2 Warn', bg: 'bg-blue-50', txt: 'text-blue-700', bdr: 'border-blue-200', cat: 'warn' },
            3: { lbl: 'L3 Alert', bg: 'bg-amber-50', txt: 'text-amber-700', bdr: 'border-amber-200', cat: 'warn' },
            4: { lbl: 'L4 High', bg: 'bg-orange-50', txt: 'text-orange-700', bdr: 'border-orange-200', cat: 'crit' },
            5: { lbl: 'L5 Crit', bg: 'bg-red-50', txt: 'text-red-700', bdr: 'border-red-200', cat: 'crit' }
        };

        const ws = new WebSocket("ws://" + window.location.host + "/ws/alerts");

        ws.onmessage = (e) => {
            const emptyState = document.getElementById('empty-state');
            if(emptyState) emptyState.classList.add('hidden');

            const data = JSON.parse(e.data);
            const p = data.event;
            const r = data.threat_rating;
            const ui = styles[r] || styles[0];
            const ts = new Date().toLocaleTimeString();

            updateStats(ui.cat);

            const row = document.createElement('div');
            // Увеличена высота (py-5) и межстрочный интервал для "дыхания" данных
            row.className = "log-item px-8 py-5 border-b border-slate-100 flex items-center cursor-pointer hover:bg-slate-50/80 transition-all group animate-in slide-in-from-top-1 duration-300";
            row.setAttribute('data-level', r.toString());
            row.onclick = () => selectLog(row, data, ts);

            row.innerHTML = `
                <div class="w-24 flex-shrink-0">
                    <span class="text-[9px] font-black px-2 py-1 rounded border shadow-sm ${ui.bg} ${ui.txt} ${ui.bdr}">${ui.lbl}</span>
                </div>
                <div class="flex-1 min-w-0 px-6">
                    <div class="text-[13px] text-slate-900 font-bold truncate leading-none mb-1">${p.service.toUpperCase()}</div>
                    <div class="text-[10px] text-slate-400 font-mono font-medium tracking-tight">${p.protocol_type} // ${p.flag}</div>
                </div>
                <div class="text-right">
                    <div class="text-[10px] text-slate-900 font-mono font-bold leading-none mb-1">${ts}</div>
                    <div class="text-[9px] text-slate-400 uppercase font-bold tracking-tighter">${p.src_bytes.toLocaleString()} bytes</div>
                </div>
            `;

            const container = document.getElementById('stream-target');
            container.insertBefore(row, container.firstChild);
            applyFiltersToElement(row);
        };

        function toggleFilterMenu(e) {
            e.stopPropagation();
            document.getElementById('filter-menu').classList.toggle('active');
        }

        document.querySelectorAll('.filter-checkbox').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const val = e.target.value;
                if (e.target.checked) activeFilters.add(val);
                else activeFilters.delete(val);
                runGlobalFilter();
            });
        });

        function runGlobalFilter() {
            document.querySelectorAll('.log-item').forEach(item => applyFiltersToElement(item));
        }

        function applyFiltersToElement(el) {
            const level = el.getAttribute('data-level');
            el.style.display = (activeFilters.size === 0 || activeFilters.has(level)) ? 'flex' : 'none';
        }

        function clearFilters() {
            activeFilters.clear();
            document.querySelectorAll('.filter-checkbox').forEach(cb => cb.checked = false);
            runGlobalFilter();
        }

        window.addEventListener('click', (e) => {
            const menu = document.getElementById('filter-menu');
            if (menu && !menu.contains(e.target) && !document.getElementById('filter-btn').contains(e.target)) {
                menu.classList.remove('active');
            }
        });

        function updateStats(cat) {
            counts.total++;
            counts[cat]++;
            document.getElementById('stat-total').innerText = counts.total.toLocaleString();
            document.getElementById('stat-safe').innerText = counts.safe;
            document.getElementById('stat-warn').innerText = counts.warn;
            document.getElementById('stat-crit').innerText = counts.crit;
        }

        async function selectLog(el, data, ts) {
            document.querySelectorAll('.log-item').forEach(r => r.classList.remove('selected-row'));
            el.classList.add('selected-row');

            const panel = document.getElementById('detail-panel');
            panel.classList.replace('w-0', 'w-[450px]');
            panel.classList.replace('opacity-0', 'opacity-100');

            const reasonEl = document.getElementById('det-reason');
            reasonEl.innerHTML = `<div class="flex items-center space-x-2"><span class="animate-spin h-3 w-3 border-2 border-cyan-600 border-t-transparent rounded-full"></span><span class="text-[10px] text-slate-500 font-mono font-bold uppercase tracking-widest">SHAP heuristics processing...</span></div>`;

            const ui = styles[data.threat_rating];
            document.getElementById('det-badge').innerText = ui.lbl;
            document.getElementById('det-badge').className = `px-3 py-1 rounded-lg text-[10px] font-black uppercase border shadow-sm ${ui.bg} ${ui.txt} ${ui.bdr}`;
            document.getElementById('det-timestamp').innerText = `Incident Signature Detected @ ${ts}`;
            document.getElementById('det-service').innerText = data.event.service;
            document.getElementById('det-proto').innerText = data.event.protocol_type;
            document.getElementById('det-flag').innerText = data.event.flag;
            document.getElementById('det-bytes').innerText = `${data.event.src_bytes.toLocaleString()} B`;

            try {
                const resp = await fetch('/api/v1/explain', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data.event)
                });
                const result = await resp.json();
                reasonEl.innerText = result.explanation;
            } catch (err) {
                reasonEl.innerText = "Internal analysis engine returned an error. Manual triage required.";
            }
        }

        function closePanel() {
            const panel = document.getElementById('detail-panel');
            panel.classList.replace('w-[450px]', 'w-0');
            panel.classList.replace('opacity-100', 'opacity-0');
            document.querySelectorAll('.log-item').forEach(r => r.classList.remove('selected-row'));
        }
    </script>
</body>
</html>
